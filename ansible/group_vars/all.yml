---
# =============================================================================
#  Global settings for PiCluster
# =============================================================================
# CHANGE THE PASSWORDS / TOKENS BELOW BEFORE DEPLOYING ANYWHERE PUBLIC.
# For real secrets, move these into an ansible-vault encrypted file:
#     ansible-vault create ../group_vars/secret.yml
# and Ansible will load both files automatically.

# ---------------------------------------------------------------------------
# Credentials & SSH
# ---------------------------------------------------------------------------
# The expected flow is:
#   1. `piclusterctl setup-keys` distributes ~/.ssh/id_ed25519.pub to every
#      host (using the SSH password once).
#   2. Subsequent Ansible runs use that key - no SSH password needed.
#
# `ansible_become_password` is still required so sudo works during plays
# (Raspberry Pi OS users do not have NOPASSWD by default).
ansible_user: eachan
ansible_become: true
ansible_become_method: sudo
ansible_become_password: w00dhill

# If you really need password-based SSH auth (e.g. you can't distribute keys),
# set this and ensure `sshpass` is installed. Leave commented to force key auth.
# ansible_password: w00dhill

# ---------------------------------------------------------------------------
# Named hosts (used by templates / roles instead of hard-coding inventory)
# ---------------------------------------------------------------------------
supervisor_host: supervisor
ai_host: ai

# ---------------------------------------------------------------------------
# Project paths
# ---------------------------------------------------------------------------
project_root: /opt/picluster
project_repo: "https://github.com/eachan/PiCluster.git"
project_branch: main

# ---------------------------------------------------------------------------
# K3s cluster
# ---------------------------------------------------------------------------
k3s_version: v1.30.4+k3s1
# A static shared token used by K3s servers/agents to join. Change this!
k3s_token: "PiClusterJoinTokenChangeMe-9f3c-4f1e-bd6b"
# API endpoint other nodes use to register. Using a hostname (not an IP) means
# you can move it later by changing DNS.
k3s_api_endpoint: "node-1"
k3s_api_port: 6443

# ---------------------------------------------------------------------------
# GlusterFS storage
# ---------------------------------------------------------------------------
# Each cluster node has a 1 TB USB drive. We mount it at /srv/brick and use
# the directory /srv/brick/storage as the Gluster brick.
gluster_brick_device_hint: "usb"     # used to auto-detect the USB disk
gluster_brick_mount: /srv/brick
gluster_brick_path: /srv/brick/storage
gluster_volume_name: storage
gluster_mount_point: /mnt/storage    # where the assembled volume is mounted on every node

# ---------------------------------------------------------------------------
# Samba / Windows file share
# ---------------------------------------------------------------------------
samba_share_name: storage
samba_share_path: "{{ gluster_mount_point }}/share"
samba_workgroup: WORKGROUP
samba_user: eachan
samba_password: w00dhill
# CTDB public IP that Windows clients connect to. Pick an unused address on
# your LAN; the three nodes will float this address between them.
ctdb_public_addresses:
  - "192.168.1.50/24 eth0"
# Internal addresses (one per node) used by CTDB to talk to itself. Edit to
# match your network if it isn't a /24 with .101/.102/.103 layout.
ctdb_nodes:
  - "192.168.1.134"
  - "192.168.1.230"
  - "192.168.1.162"

# ---------------------------------------------------------------------------
# Monitoring (Prometheus + Grafana)
# ---------------------------------------------------------------------------
prometheus_version: "2.53.0"
grafana_admin_password: "w00dhill"
node_exporter_version: "1.8.1"

# ---------------------------------------------------------------------------
# Dashboard
# ---------------------------------------------------------------------------
dashboard_port: 80
dashboard_internal_port: 8000

# ---------------------------------------------------------------------------
# Ollama / AI
# ---------------------------------------------------------------------------
ollama_models:
  - llama3.2:3b           # small enough to run quickly on the AI Pi
ollama_listen_address: "0.0.0.0:11434"
