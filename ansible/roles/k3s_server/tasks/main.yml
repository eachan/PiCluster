---
# Install/upgrade K3s in HA mode. The first node in groups['cluster']
# initialises the cluster (--cluster-init); subsequent nodes --server join it.

# ---------------------------------------------------------------------------
# Kernel/cmdline prerequisites on Raspberry Pi OS
# ---------------------------------------------------------------------------
- name: Detect Raspberry Pi cmdline.txt location
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /boot/firmware/cmdline.txt
    - /boot/cmdline.txt
  register: _cmdline_stat

- name: Set cmdline.txt path fact
  ansible.builtin.set_fact:
    _cmdline_path: "{{ (_cmdline_stat.results | selectattr('stat.exists') | list | first).stat.path | default('') }}"

- name: Enable cgroup memory + cpuset on cmdline.txt
  ansible.builtin.replace:
    path: "{{ _cmdline_path }}"
    regexp: '^(?!.*cgroup_memory=1)(.*)$'
    replace: '\1 cgroup_memory=1 cgroup_enable=memory cgroup_enable=cpuset'
  register: _cmdline_change
  when: _cmdline_path != ""

- name: Reboot if cgroup flags were just added
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - _cmdline_change is defined
    - _cmdline_change.changed | default(false)

- name: Install iptables (legacy mode preferred for K3s on RPi)
  ansible.builtin.apt:
    name:
      - iptables
      - nfs-common
      - open-iscsi
    state: present

- name: Use iptables-legacy
  community.general.alternatives:
    name: "{{ item.name }}"
    path: "{{ item.path }}"
  loop:
    - { name: iptables,  path: /usr/sbin/iptables-legacy }
    - { name: ip6tables, path: /usr/sbin/ip6tables-legacy }
  ignore_errors: true

- name: UFW - allow K3s API + Flannel VXLAN + Kubelet metrics
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "6443",  proto: tcp }   # K3s API
    - { port: "10250", proto: tcp }   # Kubelet
    - { port: "8472",  proto: udp }   # Flannel VXLAN
    - { port: "2379:2380", proto: tcp } # etcd
  ignore_errors: true

# K3s pods talk to each other and to the API service (10.43.0.1) through
# the FORWARD chain when the chosen endpoint is on a remote node. UFW's
# default forward policy is DROP, which silently breaks all pod -> service
# traffic that doesn't happen to land locally. Two corrections:
#   1. Switch UFW's default forward policy to ACCEPT (safe here - cluster
#      nodes aren't acting as gateway routers for anything else).
#   2. Explicitly allow traffic originating from the pod and service CIDRs.
- name: UFW - default forward policy ACCEPT (required by K3s overlay)
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  register: _ufw_forward_policy

# `ufw reload` does NOT re-read /etc/default/ufw on older UFW versions, so we
# disable -> enable to guarantee the new forward policy is applied to the
# in-memory iptables chain. While we're at it, set the live policy directly
# so the cluster heals immediately without waiting for the next reboot.
- name: Bounce UFW to apply the new forward policy
  when: _ufw_forward_policy.changed
  block:
    - name: UFW - disable
      community.general.ufw:
        state: disabled
    - name: UFW - enable
      community.general.ufw:
        state: enabled

- name: Set iptables FORWARD chain policy to ACCEPT (immediate)
  ansible.builtin.command: iptables -P FORWARD ACCEPT
  changed_when: false

- name: UFW - allow pod and service CIDRs (INPUT)
  community.general.ufw:
    rule: allow
    src: "{{ item }}"
  loop:
    - "10.42.0.0/16"   # K3s pod CIDR
    - "10.43.0.0/16"   # K3s service CIDR
  ignore_errors: true

# Belt-and-suspenders: even with FORWARD policy=ACCEPT, UFW's
# ufw-reject-forward / ufw-before-forward chains can drop traffic before
# the default policy is consulted. Explicit `route allow` rules land in
# ufw-user-forward and short-circuit those rejects for K3s overlay traffic.
- name: UFW - allow forwarded K3s overlay traffic (route rules)
  community.general.ufw:
    rule: allow
    route: true
    src: "{{ item.src }}"
    dest: "{{ item.dst }}"
  loop:
    - { src: "10.42.0.0/16", dst: "any" }
    - { src: "any",          dst: "10.42.0.0/16" }
    - { src: "10.43.0.0/16", dst: "any" }
    - { src: "any",          dst: "10.43.0.0/16" }
  register: _ufw_route_rules
  ignore_errors: true

# If UFW was just reconfigured, any pods that were stuck in CrashLoopBackOff
# (because they couldn't reach the API service through the old broken FORWARD
# chain) won't retry quickly - their backoff timer can be up to 5 min. Nudge
# the core kube-system workloads to roll fresh pods that pick up the now-
# working networking immediately. Idempotent: if pods are healthy, rollout
# restart just does a clean rolling update with no real downtime.
- name: Force kube-system core workloads to restart after UFW changes
  when:
    - inventory_hostname == groups['cluster'][0]
    - >-
      _ufw_forward_policy.changed
      or (_ufw_route_rules.results | default([]) | selectattr('changed', 'equalto', true) | list | length > 0)
  block:
    - name: Get list of kube-system deployments that exist
      ansible.builtin.shell: >-
        k3s kubectl -n kube-system get deploy -o name 2>/dev/null || true
      register: _kubesys_deploys
      changed_when: false

    - name: Rollout restart each kube-system deployment
      ansible.builtin.command: "k3s kubectl -n kube-system rollout restart {{ item }}"
      loop: "{{ _kubesys_deploys.stdout_lines }}"
      when: _kubesys_deploys.stdout_lines | length > 0
      changed_when: true
      failed_when: false

# ---------------------------------------------------------------------------
# Install k3s
# ---------------------------------------------------------------------------
- name: Check if k3s is already installed at the requested version
  ansible.builtin.command: k3s --version
  register: _k3s_installed
  changed_when: false
  failed_when: false

- name: Determine whether this is the bootstrap server
  ansible.builtin.set_fact:
    _is_bootstrap: "{{ inventory_hostname == groups['cluster'][0] }}"

- name: Build K3s install command (bootstrap)
  ansible.builtin.set_fact:
    _k3s_install_exec: >-
      server
      --cluster-init
      --tls-san {{ k3s_api_endpoint }}
      --disable=servicelb
      --write-kubeconfig-mode=0644
      --node-name={{ inventory_hostname }}
  when: _is_bootstrap

- name: Build K3s install command (joining server)
  ansible.builtin.set_fact:
    _k3s_install_exec: >-
      server
      --server https://{{ k3s_api_endpoint }}:{{ k3s_api_port }}
      --tls-san {{ k3s_api_endpoint }}
      --disable=servicelb
      --write-kubeconfig-mode=0644
      --node-name={{ inventory_hostname }}
  when: not _is_bootstrap

- name: Install/upgrade K3s
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_TOKEN="{{ k3s_token }}" \
      INSTALL_K3S_EXEC="{{ _k3s_install_exec }}" \
      sh -
  args:
    executable: /bin/bash
  when: k3s_version not in (_k3s_installed.stdout | default(''))
  register: _k3s_install
  changed_when: "'Starting k3s' in _k3s_install.stdout or _k3s_install.rc == 0"

- name: Ensure k3s service is enabled + started
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for the API to become ready
  ansible.builtin.wait_for:
    host: "{{ inventory_hostname }}"
    port: 6443
    delay: 5
    timeout: 180

# ---------------------------------------------------------------------------
# Convenience: copy kubeconfig to ~/.kube/config for the SSH user, and to
# the project root so the supervisor can fetch it.
# ---------------------------------------------------------------------------
- name: Ensure user kube directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  when: _is_bootstrap

- name: Copy kubeconfig for SSH user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    remote_src: true
  when: _is_bootstrap

- name: Rewrite kubeconfig server URL to use {{ k3s_api_endpoint }}
  ansible.builtin.replace:
    path: "/home/{{ ansible_user }}/.kube/config"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ k3s_api_endpoint }}:6443"
  when: _is_bootstrap

- name: Fetch kubeconfig back to the controller
  ansible.builtin.fetch:
    src: "/home/{{ ansible_user }}/.kube/config"
    dest: "{{ playbook_dir }}/../../local/kubeconfig"
    flat: true
  when: _is_bootstrap
