---
# Install Samba + CTDB on every node. CTDB clusters them so Windows clients
# always see the same VIP regardless of which node currently owns it.

- name: Install Samba and CTDB
  ansible.builtin.apt:
    name:
      - samba
      - samba-common-bin
      - ctdb
    state: present
    update_cache: true

- name: Ensure Samba share directory exists on the Gluster volume
  ansible.builtin.file:
    path: "{{ samba_share_path }}"
    state: directory
    owner: "{{ samba_user }}"
    group: "{{ samba_user }}"
    mode: "0775"
  run_once: true
  delegate_to: "{{ groups['cluster'][0] }}"

# ---------------------------------------------------------------------------
# CTDB configuration
# ---------------------------------------------------------------------------
- name: Ensure /etc/ctdb exists
  ansible.builtin.file:
    path: /etc/ctdb
    state: directory
    mode: "0755"

- name: Write CTDB main config
  ansible.builtin.copy:
    dest: /etc/ctdb/ctdb.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [cluster]
        transport = tcp
        recovery lock = {{ gluster_mount_point }}/ctdb/recovery.lock
        node address = {{ ctdb_nodes[gluster_brick_id - 1] }}
      [legacy]
        start as stopped = false
        start as disabled = false
  notify: restart ctdb

- name: Write CTDB nodes file
  ansible.builtin.copy:
    dest: /etc/ctdb/nodes
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for n in ctdb_nodes %}
      {{ n }}
      {% endfor %}
  notify: restart ctdb

- name: Write CTDB public addresses
  ansible.builtin.copy:
    dest: /etc/ctdb/public_addresses
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for a in ctdb_public_addresses %}
      {{ a }}
      {% endfor %}
  notify: restart ctdb

# ---------------------------------------------------------------------------
# Samba configuration
# ---------------------------------------------------------------------------
- name: Write smb.conf
  ansible.builtin.copy:
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [global]
        workgroup = {{ samba_workgroup }}
        server string = PiCluster Storage (%h)
        netbios name = picluster
        security = user
        map to guest = bad user
        clustering = yes
        ctdbd socket = /var/run/ctdb/ctdbd.socket
        passdb backend = tdbsam
        log file = /var/log/samba/log.%m
        max log size = 1000
        logging = file
        panic action = /usr/share/samba/panic-action %d
        server min protocol = SMB2
        smb encrypt = desired
        # gluster integration via fuse mount - good throughput on small files
        kernel share modes = no
        kernel oplocks = no
        posix locking = no

      [{{ samba_share_name }}]
        comment = PiCluster Replicated Storage
        path = {{ samba_share_path }}
        read only = no
        browseable = yes
        guest ok = no
        valid users = {{ samba_user }}
        create mask = 0664
        directory mask = 0775
        force user = {{ samba_user }}
        force group = {{ samba_user }}
  notify:
    - restart samba

# Make sure smbd starts AFTER CTDB (so CTDB's tdb sockets are ready) and
# is restarted whenever CTDB restarts.
- name: smbd systemd drop-in dir
  ansible.builtin.file:
    path: /etc/systemd/system/smbd.service.d
    state: directory
    mode: "0755"

- name: smbd systemd drop-in - order after ctdb
  ansible.builtin.copy:
    dest: /etc/systemd/system/smbd.service.d/ctdb-order.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      After=ctdb.service network-online.target
      Requires=ctdb.service
  notify: restart samba

- name: Reload systemd to pick up drop-ins
  ansible.builtin.systemd:
    daemon_reload: true

# ---------------------------------------------------------------------------
# Bring CTDB up FIRST. Once CTDB is healthy, the Samba tdb databases that
# smbpasswd writes to become reachable (clustering = yes in smb.conf routes
# them through CTDB).
# ---------------------------------------------------------------------------
- name: Flush handlers so any ctdb config changes restart it now
  ansible.builtin.meta: flush_handlers

- name: Enable + start CTDB
  ansible.builtin.systemd:
    name: ctdb
    enabled: true
    state: started

- name: Wait for CTDB to be healthy (Recovery mode:NORMAL)
  ansible.builtin.shell: |
    set -e
    for i in $(seq 1 30); do
      if ctdb status 2>/dev/null | grep -q 'Recovery mode:NORMAL'; then
        exit 0
      fi
      sleep 2
    done
    exit 1
  args:
    executable: /bin/bash
  become: true
  changed_when: false
  register: _ctdb_wait
  failed_when: _ctdb_wait.rc != 0

# ---------------------------------------------------------------------------
# Now CTDB is up, we can write to Samba's clustered passwd database.
# ---------------------------------------------------------------------------
- name: Ensure Samba user exists at OS level
  ansible.builtin.user:
    name: "{{ samba_user }}"
    state: present
    shell: /usr/sbin/nologin
    create_home: false
  when: samba_user != ansible_user

- name: Check if Samba user already exists in passdb
  ansible.builtin.command: "pdbedit -L -u {{ samba_user }}"
  register: _pdb_check
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ groups['cluster'][0] }}"

- name: Add Samba user to passdb (run once, on bootstrap node)
  ansible.builtin.shell: |
    printf '%s\n%s\n' '{{ samba_password }}' '{{ samba_password }}' \
      | smbpasswd -s -a '{{ samba_user }}'
  args:
    executable: /bin/bash
  when: _pdb_check.rc != 0 or _pdb_check.stdout == ""
  run_once: true
  delegate_to: "{{ groups['cluster'][0] }}"
  register: _smbpasswd_add
  changed_when: "'Added user' in (_smbpasswd_add.stdout | default(''))"

- name: Ensure Samba password is set to the configured value
  ansible.builtin.shell: |
    printf '%s\n%s\n' '{{ samba_password }}' '{{ samba_password }}' \
      | smbpasswd -s '{{ samba_user }}'
  args:
    executable: /bin/bash
  run_once: true
  delegate_to: "{{ groups['cluster'][0] }}"
  changed_when: false

- name: Enable + start smbd / nmbd
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - smbd
    - nmbd

- name: UFW - allow SMB + CTDB ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "445",  proto: tcp }   # SMB
    - { port: "139",  proto: tcp }   # NetBIOS-SSN
    - { port: "137",  proto: udp }   # NetBIOS-NS
    - { port: "138",  proto: udp }   # NetBIOS-DGM
    - { port: "4379", proto: tcp }   # CTDB cluster traffic
  ignore_errors: true
