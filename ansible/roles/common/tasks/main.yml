---
# Baseline configuration for every host: hostname, packages, timezone,
# kernel tweaks, firewall, node_exporter.

- name: Set hostname to inventory name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/hosts has 127.0.1.1 entry for hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ system_timezone | default('UTC') }}"
  ignore_errors: true   # community.general isn't required to be present

- name: APT - update cache (daily)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400

- name: APT - install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - wget
      - git
      - htop
      - jq
      - unzip
      - rsync
      - vim
      - tmux
      - python3
      - python3-pip
      - python3-venv
      - chrony
      - ufw
      - net-tools
      - dnsutils
      - parted
      - lsb-release
      - gnupg
    state: present

- name: Enable + start chrony for time sync
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Ensure project directory exists
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

# Firewall configuration.
#
# UFW is enabled on the supervisor + AI nodes (the real security perimeter)
# but EXPLICITLY DISABLED on cluster nodes. Reason: K3s manages its own
# iptables rules (Flannel + kube-router + kube-proxy) and Pi OS Bookworm
# ships an iptables-nft / iptables-legacy split that causes UFW and K3s to
# operate on different backends. With UFW running, pod-to-service traffic
# (e.g. pods reaching the API service at 10.43.0.1) gets silently dropped
# even with a permissive policy + route-allow rules.
#
# Cluster nodes are on a private LAN behind a router NAT and only run
# trusted services (K3s, Samba, node_exporter). The supervisor's UFW + the
# upstream router are the actual security perimeter.
- name: Configure UFW (non-cluster hosts only)
  when: inventory_hostname not in groups.get('cluster', [])
  block:
    - name: UFW - default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny
      ignore_errors: true

    - name: UFW - default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow
      ignore_errors: true

    - name: UFW - allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH
      ignore_errors: true

    - name: UFW - allow LAN subnet
      community.general.ufw:
        rule: allow
        src: "{{ lan_cidr | default('192.168.0.0/16') }}"
      ignore_errors: true

    - name: UFW - enable
      community.general.ufw:
        state: enabled
      ignore_errors: true

- name: Ensure UFW is fully disabled on cluster nodes (K3s manages iptables)
  when: inventory_hostname in groups.get('cluster', [])
  block:
    - name: UFW - reset (cluster nodes)
      community.general.ufw:
        state: reset
      ignore_errors: true

    - name: UFW - disable (cluster nodes)
      community.general.ufw:
        state: disabled
      ignore_errors: true

    - name: ufw.service - mask so it doesn't auto-start on reboot
      ansible.builtin.systemd:
        name: ufw
        enabled: false
        state: stopped
      ignore_errors: true

    # `ufw disable` does NOT undo the iptables FORWARD policy DROP that UFW
    # installs at the kernel level, nor does it flush leftover ufw-* chains.
    # K3s only repairs its FORWARD rules at its own startup, so if K3s was
    # already running while UFW was active its KUBE-FORWARD jumps sit below
    # a DROP default and pod -> ClusterIP traffic (e.g. 10.43.0.1:443) gets
    # silently dropped. We:
    #   1. force FORWARD policy back to ACCEPT (legacy + nft backends),
    #   2. flush leftover ufw-* chains in both backends,
    #   3. bounce K3s so it reinstalls its KUBE-* iptables jumps cleanly,
    #   4. wait for the apiserver to come back before moving on.
    #
    # `throttle: 1` means only one cluster node performs this at a time, so
    # the embedded etcd never loses quorum during the rolling fix.
    - name: Reset iptables, flush ufw-* chains, and bounce K3s if needed
      ansible.builtin.shell: |
        set -e
        changed=0
        for ipt in iptables-legacy iptables-nft; do
          command -v $ipt >/dev/null 2>&1 || continue
          for chain in FORWARD INPUT OUTPUT; do
            if $ipt -S $chain 2>/dev/null | head -n1 | grep -q "P $chain DROP"; then
              $ipt -P $chain ACCEPT
              changed=1
            fi
          done
          for chain in FORWARD INPUT OUTPUT; do
            while $ipt -S $chain 2>/dev/null | grep -q '\-j ufw'; do
              rule=$($ipt -S $chain | grep -m1 '\-j ufw' | sed 's/^-A /-D /')
              # shellcheck disable=SC2086
              $ipt $rule || break
              changed=1
            done
          done
          for c in $($ipt -S 2>/dev/null | awk '/^-N ufw-/ {print $2}'); do
            $ipt -F "$c" 2>/dev/null || true
            $ipt -X "$c" 2>/dev/null || true
            changed=1
          done
        done
        if [ "$changed" = "0" ]; then
          echo NOCHANGE
          exit 0
        fi
        if systemctl is-active --quiet k3s.service; then
          systemctl restart k3s.service
          # Wait for the local apiserver to be ready again. The k3s server
          # listens on 6443 only after etcd has rejoined and the apiserver
          # answers, so this is a real readiness check, not just a port probe.
          for i in $(seq 1 60); do
            if curl -ks --max-time 2 https://127.0.0.1:6443/readyz >/dev/null 2>&1; then
              echo CHANGED
              exit 0
            fi
            sleep 2
          done
          echo CHANGED_BUT_UNHEALTHY
          exit 1
        fi
        echo CHANGED
      args:
        executable: /bin/bash
      register: _ipt_reset
      changed_when: "'CHANGED' in (_ipt_reset.stdout | default(''))"
      throttle: 1

# node_exporter on every host so Prometheus on the supervisor can scrape it.
- name: Install node_exporter
  ansible.builtin.include_tasks: node_exporter.yml
