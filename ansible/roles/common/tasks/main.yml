---
# Baseline configuration for every host: hostname, packages, timezone,
# kernel tweaks, firewall, node_exporter.

- name: Set hostname to inventory name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/hosts has 127.0.1.1 entry for hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ system_timezone | default('UTC') }}"
  ignore_errors: true   # community.general isn't required to be present

- name: APT - update cache (daily)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400

- name: APT - install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - wget
      - git
      - htop
      - jq
      - unzip
      - rsync
      - vim
      - tmux
      - python3
      - python3-pip
      - python3-venv
      - chrony
      - ufw
      - net-tools
      - dnsutils
      - parted
      - lsb-release
      - gnupg
    state: present

- name: Enable + start chrony for time sync
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Ensure project directory exists
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

# Firewall configuration.
#
# UFW is enabled on the supervisor + AI nodes (the real security perimeter)
# but EXPLICITLY DISABLED on cluster nodes. Reason: K3s manages its own
# iptables rules (Flannel + kube-router + kube-proxy) and Pi OS Bookworm
# ships an iptables-nft / iptables-legacy split that causes UFW and K3s to
# operate on different backends. With UFW running, pod-to-service traffic
# (e.g. pods reaching the API service at 10.43.0.1) gets silently dropped
# even with a permissive policy + route-allow rules.
#
# Cluster nodes are on a private LAN behind a router NAT and only run
# trusted services (K3s, Samba, node_exporter). The supervisor's UFW + the
# upstream router are the actual security perimeter.
- name: Configure UFW (non-cluster hosts only)
  when: inventory_hostname not in groups.get('cluster', [])
  block:
    - name: UFW - default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny
      ignore_errors: true

    - name: UFW - default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow
      ignore_errors: true

    - name: UFW - allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH
      ignore_errors: true

    - name: UFW - allow LAN subnet
      community.general.ufw:
        rule: allow
        src: "{{ lan_cidr | default('192.168.0.0/16') }}"
      ignore_errors: true

    - name: UFW - enable
      community.general.ufw:
        state: enabled
      ignore_errors: true

- name: Ensure UFW is fully disabled on cluster nodes (K3s manages iptables)
  when: inventory_hostname in groups.get('cluster', [])
  block:
    - name: UFW - reset (cluster nodes)
      community.general.ufw:
        state: reset
      ignore_errors: true

    - name: UFW - disable (cluster nodes)
      community.general.ufw:
        state: disabled
      ignore_errors: true

    - name: ufw.service - mask so it doesn't auto-start on reboot
      ansible.builtin.systemd:
        name: ufw
        enabled: false
        state: stopped
      ignore_errors: true

# node_exporter on every host so Prometheus on the supervisor can scrape it.
- name: Install node_exporter
  ansible.builtin.include_tasks: node_exporter.yml
