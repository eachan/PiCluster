---
# PiCluster inventory.
#
# Hostnames must resolve via your LAN DNS. SSH user is 'eachan'.
# Passwords (when needed) are read from group_vars/all.yml.

all:
  vars:
    ansible_user: eachan
    ansible_python_interpreter: /usr/bin/python3

  # Hosts are declared directly under `all` so their names never collide
  # with group names. Plays can address `supervisor` / `ai` directly as
  # hostnames; the only group we still need is `cluster`.
  hosts:
    supervisor:
      ansible_host: supervisor
    ai:
      ansible_host: ai
    node-1:
      ansible_host: node-1
      k3s_role: server
      k3s_bootstrap: true
      gluster_brick_id: 1
    node-2:
      ansible_host: node-2
      k3s_role: server
      gluster_brick_id: 2
    node-3:
      ansible_host: node-3
      k3s_role: server
      gluster_brick_id: 3

  children:
    cluster:
      hosts:
        node-1: {}
        node-2: {}
        node-3: {}
