---
# PiCluster inventory.
#
# Hostnames must resolve via your LAN DNS. SSH user is 'eachan'.
# Passwords are read from group_vars/all.yml so they are not duplicated here.

all:
  vars:
    ansible_user: eachan
    ansible_python_interpreter: /usr/bin/python3

  children:
    # The supervisor Pi: monitoring, dashboard, deploy tooling.
    supervisor:
      hosts:
        supervisor:
          ansible_host: supervisor

    # The three identical cluster nodes that form K3s + GlusterFS + Samba.
    cluster:
      hosts:
        node-1:
          ansible_host: node-1
          k3s_role: server          # first server, bootstraps the cluster
          k3s_bootstrap: true
          gluster_brick_id: 1
        node-2:
          ansible_host: node-2
          k3s_role: server          # additional HA control-plane member
          gluster_brick_id: 2
        node-3:
          ansible_host: node-3
          k3s_role: server          # additional HA control-plane member
          gluster_brick_id: 3

    # The Hailo-equipped AI Pi running Ollama.
    ai:
      hosts:
        ai:
          ansible_host: ai
