---
# Install K3s on the three cluster nodes in HA mode.
# node-1 is the bootstrap server; node-2/node-3 join its embedded etcd.
#
# We split this into two plays so the joining servers explicitly wait for
# the bootstrap's API to be reachable before they try to install. With a
# single play + serial: 1, the install script on a joining node can run
# while the bootstrap is still finishing its own etcd init - the join then
# fails to talk to the API and k3s.service refuses to start.

- name: K3s HA bootstrap server
  hosts: "{{ groups['cluster'][0] }}"
  gather_facts: true
  become: true
  tags: [cluster, k3s]
  roles:
    - role: k3s_server

- name: K3s HA joining servers
  hosts: cluster:!{{ groups['cluster'][0] }}
  gather_facts: true
  become: true
  serial: 1            # bring joining servers up one at a time
  tags: [cluster, k3s]
  pre_tasks:
    - name: Wait for bootstrap K3s API to be reachable
      ansible.builtin.wait_for:
        host: "{{ groups['cluster'][0] }}"
        port: "{{ k3s_api_port | default(6443) }}"
        timeout: 600
      delegate_to: localhost
      become: false
  roles:
    - role: k3s_server
