---
# Open WebUI - a Chat-style UI for the Ollama LLM running on the AI Pi.
# Deployed into the `apps` namespace, data persisted on the GlusterFS volume
# so the app survives any single node failure.
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  labels:
    picluster.tier: apps
---
# Persistent storage for Open WebUI (SQLite DB, uploaded files, model cache).
# Lives on the GlusterFS-replicated /mnt/storage volume, which means whichever
# cluster node the pod ends up on sees the same data.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openwebui-data
  labels:
    app: openwebui
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/storage/apps/openwebui
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: openwebui-data
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: apps
  labels:
    app: openwebui
spec:
  # SQLite cannot be safely shared by multiple processes - keep at 1.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      # Schedule on any cluster node (the gluster mount is present on each).
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [node-1, node-2, node-3]
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Point Open WebUI at the Ollama service running on the AI Pi.
            - name: OLLAMA_BASE_URL
              value: "http://ai:11434"
            # Require login; the first signup becomes the admin account.
            - name: WEBUI_AUTH
              value: "True"
            # Quiet down the periodic update check.
            - name: ENABLE_VERSION_UPDATE_CHECK
              value: "False"
            # Persist the auth secret across pod restarts.
            - name: WEBUI_SECRET_KEY_FILE
              value: "/app/backend/data/.webui_secret_key"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: apps
  labels:
    app: openwebui
  annotations:
    # Friendly label the dashboard can display.
    picluster.dashboard/title: "Open WebUI"
    picluster.dashboard/description: "Chat UI for Ollama"
    # MetalLB will hand this fixed LAN IP to the service. It floats between
    # whichever cluster nodes are up - the equivalent of a CTDB VIP.
    metallb.universe.tf/loadBalancerIPs: "192.168.1.51"
spec:
  type: LoadBalancer
  # NodePort 30080 is still allocated as a fallback (node-X:30080 keeps
  # working if MetalLB has issues).
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
  # Cluster mode means any node can answer ARP for the VIP and forward to
  # whichever node currently runs the pod. Trades source-IP preservation
  # for resilience, which is what we want here.
  externalTrafficPolicy: Cluster
